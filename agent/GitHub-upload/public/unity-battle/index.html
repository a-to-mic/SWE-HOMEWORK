<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | My project</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      html,
      body {
        background: #080706;
      }

      #unity-container {
        position: relative;
        left: auto;
        top: auto;
        width: 100%;
        height: 100%;
        transform: none;
      }

      #unity-canvas {
        width: 100%;
        height: 100%;
        opacity: 0;
      }

      #battle-hud {
        position: absolute;
        inset: 0;
        z-index: 5;
        overflow: hidden;
        pointer-events: none;
        color: #f5dfb2;
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        background:
          linear-gradient(90deg, rgba(32, 23, 15, 0.94), rgba(8, 28, 29, 0.96) 45%, rgba(33, 15, 13, 0.94)),
          repeating-linear-gradient(112deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 22px),
          #0a100f;
      }

      .hud-vignette {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 45%, transparent 0 38%, rgba(0, 0, 0, 0.28) 72%),
          linear-gradient(180deg, rgba(20, 12, 7, 0.28), transparent 32%, rgba(6, 5, 4, 0.36));
      }

      .hud-arena-floor {
        position: absolute;
        left: 7%;
        right: 7%;
        bottom: 12%;
        height: 18%;
        border-top: 1px solid rgba(217, 176, 106, 0.28);
        background:
          linear-gradient(90deg, transparent, rgba(217, 176, 106, 0.12), transparent),
          repeating-linear-gradient(8deg, rgba(217, 176, 106, 0.08) 0 1px, transparent 1px 28px);
        transform: perspective(540px) rotateX(58deg);
        transform-origin: bottom;
      }

      .hud-lane {
        position: absolute;
        left: 26%;
        right: 26%;
        top: 50%;
        height: 1px;
        background: linear-gradient(90deg, rgba(217, 176, 106, 0), rgba(159, 216, 208, 0.46), rgba(217, 176, 106, 0));
      }

      .hud-combatant {
        position: absolute;
        top: 50%;
        z-index: 4;
        display: grid;
        justify-items: center;
        gap: 8px;
        width: 180px;
        transform: translateY(-50%);
      }

      .hud-combatant.player-side {
        left: 17%;
      }

      .hud-combatant.enemy-side {
        right: 17%;
      }

      .hud-combatant::before {
        content: "";
        position: absolute;
        top: 98px;
        left: 50%;
        width: 156px;
        height: 44px;
        border: 1px solid rgba(159, 216, 208, 0.24);
        border-radius: 50%;
        background: radial-gradient(ellipse, rgba(159, 216, 208, 0.13), transparent 64%);
        transform: translateX(-50%);
      }

      .hud-combatant.is-charging::before {
        border-color: rgba(243, 201, 131, 0.72);
        background: radial-gradient(ellipse, rgba(243, 201, 131, 0.32), rgba(159, 216, 208, 0.14) 44%, transparent 70%);
        animation: chargePulse 1.1s ease-in-out infinite;
      }

      .hud-combatant.is-hit {
        animation: combatantHit 0.45s ease;
      }

      .hud-avatar-frame,
      .hud-enemy-mark {
        position: relative;
        display: grid;
        place-items: center;
        width: 118px;
        height: 118px;
        border: 1px solid rgba(217, 176, 106, 0.72);
        background: linear-gradient(180deg, #2b2118, #120e0b);
        box-shadow: 0 16px 38px rgba(0, 0, 0, 0.42);
      }

      .hud-avatar-frame::before,
      .hud-enemy-mark::before {
        content: "";
        position: absolute;
        inset: -10px;
        border: 1px solid rgba(159, 216, 208, 0.18);
      }

      .hud-avatar-frame img,
      .hud-enemy-mark img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .hud-avatar-fallback {
        display: none;
        color: #f5dfb2;
        font-size: 34px;
        font-weight: 800;
      }

      .hud-enemy-mark {
        color: #ffd3c8;
        font-size: 52px;
        font-weight: 900;
        background:
          radial-gradient(circle at 50% 42%, rgba(180, 66, 58, 0.76), rgba(56, 18, 16, 0.96)),
          #341814;
      }

      .hud-enemy-mark.has-avatar {
        background: linear-gradient(180deg, #2b2118, #120e0b);
      }

      .hud-enemy-mark.has-avatar .hud-enemy-letter {
        display: none;
      }

      .hud-enemy-mark:not(.has-avatar) img {
        display: none;
      }

      .hud-combatant-name {
        display: none;
        max-width: 180px;
        padding: 4px 10px;
        border: 1px solid rgba(217, 176, 106, 0.4);
        background: rgba(16, 12, 9, 0.74);
        color: #f5dfb2;
        font-weight: 700;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .hud-nameplate {
        position: absolute;
        top: calc(50% + 58px);
        width: min(260px, 24%);
        padding: 6px 8px;
        transform: translateX(-50%);
        border: 1px solid rgba(217, 176, 106, 0.62);
        background: rgba(20, 14, 10, 0.86);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
      }

      .hud-player {
        left: calc(17% + 90px);
      }

      .hud-enemy {
        left: calc(83% - 90px);
        right: auto;
      }

      .hud-topline {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 7px;
        font-weight: 700;
      }

      .hud-power {
        color: #9fd8d0;
      }

      .hud-hp-bar {
        height: 8px;
        overflow: hidden;
        border: 1px solid rgba(245, 223, 178, 0.36);
        background: rgba(5, 5, 5, 0.62);
      }

      .hud-hp-fill {
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, #4b9f6c, #d9b85b);
        transition: width 0.55s ease;
      }

      .hud-enemy .hud-hp-fill {
        background: linear-gradient(90deg, #bf4f4b, #e0a15d);
      }

      .hud-hp-text {
        margin-top: 3px;
        color: #d6c3a0;
        font-size: 12px;
        text-align: right;
      }

      .hud-center {
        position: absolute;
        left: 50%;
        top: 14px;
        min-width: 160px;
        padding: 6px 10px;
        transform: translateX(-50%);
        border: 1px solid rgba(159, 216, 208, 0.52);
        background: rgba(8, 16, 17, 0.7);
        text-align: center;
      }

      .hud-outcome {
        color: #9fd8d0;
        font-weight: 700;
      }

      .hud-values {
        color: #d6c3a0;
        font-size: 12px;
      }

      .hud-skill-banner {
        position: absolute;
        left: 50%;
        bottom: 30px;
        display: flex;
        gap: 8px;
        align-items: center;
        max-width: 82%;
        transform: translateX(-50%);
        opacity: 0;
      }

      .hud-skill-banner span {
        padding: 6px 10px;
        border: 1px solid rgba(217, 176, 106, 0.6);
        background: rgba(26, 17, 10, 0.78);
        color: #ffd891;
        font-weight: 700;
        white-space: nowrap;
      }

      .hud-skill-banner.playing {
        animation: skillBanner 1.05s ease both;
      }

      .hud-skill-banner.ready {
        opacity: 1;
        bottom: 24px;
      }

      .hud-projectile {
        position: absolute;
        left: 25%;
        top: 49%;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: radial-gradient(circle, #fff5bf 0%, #e0aa55 38%, rgba(224, 170, 85, 0) 72%);
        filter: drop-shadow(0 0 18px rgba(224, 170, 85, 0.9));
        opacity: 0;
      }

      .hud-projectile.fierce {
        width: 48px;
        height: 48px;
        background: radial-gradient(circle, #fff4c4 0%, #e69738 34%, rgba(196, 65, 54, 0.22) 68%, transparent 78%);
      }

      .hud-projectile.steady {
        width: 28px;
        height: 28px;
        background: radial-gradient(circle, #eafff7 0%, #78c9b3 45%, rgba(120, 201, 179, 0) 74%);
      }

      .hud-projectile.play-win {
        animation: hudShotWin 0.9s ease-in-out both;
      }

      .hud-projectile.play-lose {
        animation: hudShotLose 0.9s ease-in-out both;
        background: radial-gradient(circle, #ffd7d7 0%, #cf5e5a 42%, rgba(207, 94, 90, 0) 72%);
      }

      .hud-burst {
        position: absolute;
        left: 50%;
        top: 52%;
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 241, 178, 0.95), rgba(120, 220, 207, 0.38) 40%, transparent 72%);
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2);
      }

      .hud-burst.playing {
        animation: hudBurst 1s ease-out 0.2s both;
      }

      .hud-shield {
        position: absolute;
        left: 17%;
        top: 50%;
        z-index: 6;
        width: 170px;
        height: 170px;
        border: 2px solid rgba(159, 216, 208, 0.72);
        border-radius: 50%;
        background:
          radial-gradient(circle, rgba(159, 216, 208, 0.2), transparent 58%),
          conic-gradient(from 0deg, transparent, rgba(159, 216, 208, 0.68), transparent 34%, rgba(243, 201, 131, 0.38), transparent);
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.72);
        filter: drop-shadow(0 0 14px rgba(159, 216, 208, 0.62));
      }

      .hud-shield.playing {
        animation: shieldFlash 0.9s ease-out both;
      }

      .hud-heal-wave {
        position: absolute;
        left: 17%;
        top: 50%;
        z-index: 6;
        width: 130px;
        height: 130px;
        border-radius: 50%;
        background:
          radial-gradient(circle, rgba(158, 232, 189, 0.64), rgba(158, 232, 189, 0.18) 42%, transparent 70%);
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.45);
        filter: drop-shadow(0 0 18px rgba(158, 232, 189, 0.65));
      }

      .hud-heal-wave.playing {
        animation: healWave 1s ease-out both;
      }

      .hud-flare {
        position: absolute;
        left: 52%;
        top: 50%;
        z-index: 6;
        width: 210px;
        height: 210px;
        border-radius: 50%;
        background:
          radial-gradient(circle, rgba(255, 235, 166, 0.92), rgba(224, 91, 57, 0.36) 38%, transparent 70%);
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2);
        mix-blend-mode: screen;
      }

      .hud-flare.playing {
        animation: flareBoom 0.82s ease-out both;
      }

      .hud-slash {
        position: absolute;
        left: 41%;
        top: 29%;
        z-index: 7;
        width: 28%;
        height: 42%;
        opacity: 0;
        transform: rotate(-18deg) scale(0.4);
        background:
          linear-gradient(105deg, transparent 0 38%, rgba(255, 244, 190, 0.96) 44%, rgba(159, 216, 208, 0.72) 49%, transparent 58%),
          linear-gradient(105deg, transparent 0 48%, rgba(243, 201, 131, 0.52) 50%, transparent 62%);
        filter: drop-shadow(0 0 18px rgba(243, 201, 131, 0.82));
      }

      .hud-slash.playing {
        animation: slashCut 0.72s ease-out both;
      }

      .hud-spark {
        position: absolute;
        z-index: 7;
        width: 5px;
        height: 90px;
        border-radius: 999px;
        background: linear-gradient(180deg, transparent, #fff2b8, transparent);
        opacity: 0;
        filter: drop-shadow(0 0 8px rgba(243, 201, 131, 0.85));
      }

      .hud-spark.s1 {
        left: 56%;
        top: 30%;
        transform: rotate(34deg);
      }

      .hud-spark.s2 {
        left: 62%;
        top: 38%;
        transform: rotate(-58deg);
      }

      .hud-spark.s3 {
        left: 50%;
        top: 43%;
        transform: rotate(86deg);
      }

      .hud-spark.playing {
        animation: sparkFlash 0.72s ease-out both;
      }

      .hud-damage {
        position: absolute;
        z-index: 8;
        min-width: 54px;
        text-align: center;
        font-size: 30px;
        font-weight: 900;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.72);
        opacity: 0;
      }

      .hud-damage.enemy {
        right: 18%;
        top: 32%;
        color: #ffb0a4;
      }

      .hud-damage.player {
        left: 18%;
        top: 32%;
        color: #ffb0a4;
      }

      .hud-damage.heal {
        left: 19%;
        top: 42%;
        color: #9fe8bd;
      }

      .hud-damage.playing {
        animation: damagePop 0.95s ease-out both;
      }

      #battle-hud.shake {
        animation: hudShake 0.34s ease;
      }

      @keyframes hudShotWin {
        0% { opacity: 0; transform: translate(0, 0) scale(0.45); }
        18% { opacity: 1; }
        72% { opacity: 1; transform: translate(1020%, -5px) scale(1.08); }
        100% { opacity: 0; transform: translate(1120%, -5px) scale(0.2); }
      }

      @keyframes hudShotLose {
        0% { opacity: 0; transform: translate(1020%, -4px) scale(0.45); }
        18% { opacity: 1; }
        68% { opacity: 1; transform: translate(80%, 0) scale(1.08); }
        100% { opacity: 0; transform: translate(-30%, 0) scale(0.2); }
      }

      @keyframes hudBurst {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.2); }
        42% { opacity: 1; transform: translate(-50%, -50%) scale(1.18); }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(1.58); }
      }

      @keyframes slashCut {
        0% { opacity: 0; transform: translate(-22px, 16px) rotate(-18deg) scale(0.35); }
        22% { opacity: 1; }
        58% { opacity: 1; transform: translate(14px, -8px) rotate(-18deg) scale(1.12); }
        100% { opacity: 0; transform: translate(36px, -18px) rotate(-18deg) scale(1.35); }
      }

      @keyframes shieldFlash {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5) rotate(0deg); }
        28% { opacity: 1; transform: translate(-50%, -50%) scale(1.08) rotate(80deg); }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(1.28) rotate(180deg); }
      }

      @keyframes healWave {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
        35% { opacity: 1; transform: translate(-50%, -50%) scale(0.92); }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(1.45); }
      }

      @keyframes flareBoom {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.18); }
        40% { opacity: 0.86; transform: translate(-50%, -50%) scale(1); }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
      }

      @keyframes sparkFlash {
        0% { opacity: 0; scale: 0.35 0.2; }
        28% { opacity: 1; scale: 1 1; }
        100% { opacity: 0; scale: 1.25 0.35; }
      }

      @keyframes chargePulse {
        0%, 100% { transform: translateX(-50%) scale(0.92); opacity: 0.7; }
        50% { transform: translateX(-50%) scale(1.12); opacity: 1; }
      }

      @keyframes combatantHit {
        0%, 100% { transform: translateY(-50%) translateX(0); filter: none; }
        42% { transform: translateY(-50%) translateX(14px); filter: brightness(1.45); }
      }

      @keyframes damagePop {
        0% { opacity: 0; transform: translateY(16px) scale(0.72); }
        20% { opacity: 1; transform: translateY(0) scale(1.14); }
        100% { opacity: 0; transform: translateY(-36px) scale(0.96); }
      }

      @keyframes skillBanner {
        0% { opacity: 0; transform: translate(-50%, 14px); }
        18% { opacity: 1; transform: translate(-50%, 0); }
        82% { opacity: 1; transform: translate(-50%, 0); }
        100% { opacity: 0; transform: translate(-50%, -10px); }
      }

      @keyframes hudShake {
        0%, 100% { transform: translate(0, 0); }
        25% { transform: translate(5px, -2px); }
        50% { transform: translate(-5px, 2px); }
        75% { transform: translate(3px, 1px); }
      }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="battle-hud">
        <div class="hud-vignette"></div>
        <div class="hud-arena-floor"></div>
        <div class="hud-lane"></div>
        <div class="hud-nameplate hud-player">
          <div class="hud-topline">
            <span id="hud-player-name">你</span>
            <span class="hud-power" id="hud-player-power">待势</span>
          </div>
          <div class="hud-hp-bar"><div class="hud-hp-fill" id="hud-player-hp-fill"></div></div>
          <div class="hud-hp-text" id="hud-player-hp-text">气血 -- / --</div>
        </div>
        <div class="hud-nameplate hud-enemy">
          <div class="hud-topline">
            <span id="hud-enemy-name">对手</span>
            <span class="hud-power" id="hud-enemy-power">?</span>
          </div>
          <div class="hud-hp-bar"><div class="hud-hp-fill" id="hud-enemy-hp-fill"></div></div>
          <div class="hud-hp-text" id="hud-enemy-hp-text">气血 -- / --</div>
        </div>
        <div class="hud-center">
          <div class="hud-outcome" id="hud-outcome">凝神对峙</div>
          <div class="hud-values" id="hud-values">选择招式后结算灵势</div>
        </div>
        <div class="hud-combatant player-side">
          <div class="hud-avatar-frame">
            <img id="hud-player-avatar" alt="">
            <span class="hud-avatar-fallback" id="hud-player-fallback">修</span>
          </div>
          <div class="hud-combatant-name" id="hud-player-name-plate">你</div>
        </div>
        <div class="hud-combatant enemy-side">
          <div class="hud-enemy-mark" id="hud-enemy-mark">
            <img id="hud-enemy-avatar" alt="">
            <span class="hud-enemy-letter" id="hud-enemy-letter">敌</span>
          </div>
          <div class="hud-combatant-name" id="hud-enemy-name-plate">对手</div>
        </div>
        <div class="hud-projectile" id="hud-projectile"></div>
        <div class="hud-shield" id="hud-shield"></div>
        <div class="hud-heal-wave" id="hud-heal-wave"></div>
        <div class="hud-flare" id="hud-flare"></div>
        <div class="hud-slash" id="hud-slash"></div>
        <div class="hud-spark s1" id="hud-spark-1"></div>
        <div class="hud-spark s2" id="hud-spark-2"></div>
        <div class="hud-spark s3" id="hud-spark-3"></div>
        <div class="hud-burst" id="hud-burst"></div>
        <div class="hud-damage enemy" id="hud-enemy-damage"></div>
        <div class="hud-damage player" id="hud-player-damage"></div>
        <div class="hud-damage heal" id="hud-heal"></div>
        <div class="hud-skill-banner" id="hud-skill-banner"></div>
      </div>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">My project</div>
      </div>
    </div>
    <script>

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");
      var unityInstanceRef = null;
      var pendingMessages = [];
      var isEmbed = new URLSearchParams(window.location.search).get("embed") === "1";
      var currentBattleState = null;
      var hud = {};

      if (isEmbed) {
        document.documentElement.style.width = "100%";
        document.documentElement.style.height = "100%";
        document.body.style.width = "100%";
        document.body.style.height = "100%";
        document.body.style.margin = "0";
        document.body.style.overflow = "hidden";
      }

      function sendToUnity(objectName, methodName, payload) {
        var json = JSON.stringify(payload || {});
        if (!unityInstanceRef) {
          pendingMessages.push([objectName, methodName, json]);
          return;
        }
        try {
          unityInstanceRef.SendMessage(objectName, methodName, json);
        } catch (err) {
          console.warn("Unity bridge message failed:", err);
        }
      }

      function clampNumber(value, min, max) {
        return Math.max(min, Math.min(max, Number(value) || 0));
      }

      function hpPercent(value, max) {
        var safeMax = Math.max(1, Number(max) || 1);
        return clampNumber(value, 0, safeMax) / safeMax * 100;
      }

      function setText(id, text) {
        var el = hud[id] || document.getElementById(id);
        hud[id] = el;
        if (el) el.textContent = text;
      }

      function setPlayerAvatar(src) {
        var img = hud.playerAvatar || document.getElementById("hud-player-avatar");
        var fallback = hud.playerFallback || document.getElementById("hud-player-fallback");
        hud.playerAvatar = img;
        hud.playerFallback = fallback;
        if (!img || !fallback) return;

        if (src) {
          img.src = src;
          img.style.display = "block";
          fallback.style.display = "none";
          img.onerror = function () {
            img.style.display = "none";
            fallback.style.display = "block";
          };
        } else {
          img.removeAttribute("src");
          img.style.display = "none";
          fallback.style.display = "block";
        }
      }

      function setEnemyAvatar(src, enemyName) {
        var wrap = hud.enemyMark || document.getElementById("hud-enemy-mark");
        var img = hud.enemyAvatar || document.getElementById("hud-enemy-avatar");
        var letter = hud.enemyLetter || document.getElementById("hud-enemy-letter");
        hud.enemyMark = wrap;
        hud.enemyAvatar = img;
        hud.enemyLetter = letter;
        if (!wrap || !img || !letter) return;

        letter.textContent = String(enemyName || "敌").slice(0, 1) || "敌";
        if (src) {
          img.src = src;
          wrap.classList.add("has-avatar");
          img.onerror = function () {
            wrap.classList.remove("has-avatar");
            img.removeAttribute("src");
          };
        } else {
          wrap.classList.remove("has-avatar");
          img.removeAttribute("src");
        }
      }

      function setHp(side, hp, maxHp) {
        var fill = hud[side + "Fill"] || document.getElementById("hud-" + side + "-hp-fill");
        var text = hud[side + "Text"] || document.getElementById("hud-" + side + "-hp-text");
        hud[side + "Fill"] = fill;
        hud[side + "Text"] = text;
        if (fill) fill.style.width = hpPercent(hp, maxHp) + "%";
        if (text) text.textContent = "气血 " + clampNumber(hp, 0, maxHp) + " / " + maxHp;
      }

      function renderBattleHud(state) {
        currentBattleState = state || currentBattleState || {};
        var playerHp = currentBattleState.playerHp ?? 120;
        var playerMaxHp = currentBattleState.playerMaxHp ?? 120;
        var enemyHp = currentBattleState.enemyHp ?? 100;
        var enemyMaxHp = currentBattleState.enemyMaxHp ?? 100;

        var playerName = currentBattleState.playerName || "你";
        var enemyName = currentBattleState.enemyName || "对手";
        setText("hud-player-name", playerName);
        setText("hud-player-name-plate", playerName);
        setText("hud-enemy-name", enemyName);
        setText("hud-enemy-name-plate", enemyName);
        setPlayerAvatar(currentBattleState.playerAvatar);
        setEnemyAvatar(currentBattleState.enemyAvatar, enemyName);
        var selectedSkills = currentBattleState.selectedSkillNames || [];
        var playerNode = hud.playerNode || document.querySelector(".hud-combatant.player-side");
        hud.playerNode = playerNode;
        if (playerNode) playerNode.classList.toggle("is-charging", selectedSkills.length > 0);
        renderSkillBanner(selectedSkills.length ? selectedSkills : ["基础招式"], false);
        setText("hud-player-power", "待势");
        setText("hud-enemy-power", currentBattleState.enemyPower ?? "?");
        setText("hud-outcome", currentBattleState.mode === "tournament" ? "天机擂台" : "野外斗法");
        setText("hud-values", "选择招式后结算灵势");
        setHp("player", playerHp, playerMaxHp);
        setHp("enemy", enemyHp, enemyMaxHp);
      }

      function restartClass(el, className) {
        if (!el) return;
        el.classList.remove(className);
        void el.offsetWidth;
        el.classList.add(className);
      }

      function showPop(id, text) {
        var el = hud[id] || document.getElementById(id);
        hud[id] = el;
        if (!el || !text) return;
        el.textContent = text;
        restartClass(el, "playing");
      }

      function escapeHtml(text) {
        return String(text).replace(/[&<>"']/g, function (ch) {
          return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" })[ch];
        });
      }

      function renderSkillBanner(names, playing) {
        var skillBanner = hud.skillBanner || document.getElementById("hud-skill-banner");
        hud.skillBanner = skillBanner;
        if (!skillBanner) return;
        var list = Array.isArray(names) && names.length ? names : ["基础招式"];
        skillBanner.innerHTML = list.map(function (name) {
          return "<span>" + escapeHtml(name) + "</span>";
        }).join("");
        skillBanner.classList.toggle("ready", !playing);
        if (playing) restartClass(skillBanner, "playing");
      }

      function playBattleHud(payload) {
        var data = payload || {};
        var state = currentBattleState || {};
        var playerMaxHp = state.playerMaxHp ?? 120;
        var enemyMaxHp = state.enemyMaxHp ?? 100;
        var playerDamage = Number(data.playerDamage || 0);
        var enemyDamage = Number(data.enemyDamage || 0);
        var heal = Number(data.heal || 0);
        var incomingReduction = Number(data.incomingReduction || 0);
        var playerValue = data.playerValue ?? "-";
        var enemyValue = data.enemyValue ?? "-";
        var isWin = Boolean(data.victory);
        var choiceId = data.choiceId || "normal";

        setText("hud-player-power", playerValue);
        setText("hud-enemy-power", enemyValue);
        setText("hud-outcome", isWin ? "灵势压制" : playerDamage > 0 ? "被迫守势" : "势均力敌");
        setText("hud-values", playerValue + " 对 " + enemyValue + " ｜ " + (data.choiceName || "出手"));
        setHp("player", data.playerHpAfter ?? state.playerHp ?? playerMaxHp, playerMaxHp);
        setHp("enemy", data.enemyHpAfter ?? state.enemyHp ?? enemyMaxHp, enemyMaxHp);

        var projectile = hud.projectile || document.getElementById("hud-projectile");
        var burst = hud.burst || document.getElementById("hud-burst");
        var slash = hud.slash || document.getElementById("hud-slash");
        var shield = hud.shield || document.getElementById("hud-shield");
        var healWave = hud.healWave || document.getElementById("hud-heal-wave");
        var flare = hud.flare || document.getElementById("hud-flare");
        var spark1 = hud.spark1 || document.getElementById("hud-spark-1");
        var spark2 = hud.spark2 || document.getElementById("hud-spark-2");
        var spark3 = hud.spark3 || document.getElementById("hud-spark-3");
        var battleHud = hud.root || document.getElementById("battle-hud");
        var enemyNode = hud.enemyNode || document.querySelector(".hud-combatant.enemy-side");
        var playerNode = hud.playerNode || document.querySelector(".hud-combatant.player-side");
        hud.projectile = projectile;
        hud.burst = burst;
        hud.slash = slash;
        hud.shield = shield;
        hud.healWave = healWave;
        hud.flare = flare;
        hud.spark1 = spark1;
        hud.spark2 = spark2;
        hud.spark3 = spark3;
        hud.root = battleHud;
        hud.enemyNode = enemyNode;
        hud.playerNode = playerNode;

        if (projectile) {
          projectile.className = "hud-projectile " + choiceId + " " + (isWin ? "play-win" : "play-lose");
        }
        if (choiceId === "steady" || incomingReduction > 0) {
          restartClass(shield, "playing");
          restartClass(burst, "playing");
        }
        if (choiceId === "fierce") {
          restartClass(slash, "playing");
          restartClass(flare, "playing");
          restartClass(spark1, "playing");
          restartClass(spark2, "playing");
          restartClass(spark3, "playing");
        } else if (choiceId === "normal") {
          restartClass(burst, "playing");
          restartClass(spark1, "playing");
          restartClass(spark3, "playing");
        } else {
          restartClass(burst, "playing");
        }
        if (heal > 0) restartClass(healWave, "playing");
        restartClass(battleHud, "shake");
        restartClass(isWin ? enemyNode : playerNode, "is-hit");

        if (enemyDamage > 0) showPop("hud-enemy-damage", "-" + enemyDamage);
        if (playerDamage > 0) showPop("hud-player-damage", "-" + playerDamage);
        if (heal > 0) showPop("hud-heal", "+" + heal);

        renderSkillBanner(data.skillNames, true);

        currentBattleState = {
          ...state,
          playerHp: data.playerHpAfter ?? state.playerHp,
          enemyHp: data.enemyHpAfter ?? state.enemyHp,
          enemyPower: enemyValue,
        };
      }

      window.addEventListener("message", function (event) {
        if (event.origin !== window.location.origin) return;
        if (!event.data || !event.data.type) return;

        if (event.data.type === "battle-state") {
          renderBattleHud(event.data.payload);
          sendToUnity("BattleBridge", "ReceiveBattleState", event.data.payload);
        }

        if (event.data.type === "battle-skill") {
          playBattleHud(event.data.payload);
          sendToUnity("BattleBridge", "PlaySkill", event.data.payload);
        }
      });

      window.addEventListener("DOMContentLoaded", function () {
        renderBattleHud({});
      });

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') {
          div.style = 'background: red; padding: 10px;';
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: "unity-battle-error", message: msg }, window.location.origin);
          }
        }
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/unity-battle.loader.js";
      var config = {
        dataUrl: buildUrl + "/unity-battle.data",
        frameworkUrl: buildUrl + "/unity-battle.framework.js",
        codeUrl: buildUrl + "/unity-battle.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "My project",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      // By default, Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      // If you would like all file writes inside Unity Application.persistentDataPath
      // directory to automatically persist so that the contents are remembered when
      // the user revisits the site the next time, uncomment the following line:
      // config.autoSyncPersistentDataPath = true;
      // This autosyncing is currently not the default behavior to avoid regressing
      // existing user projects that might rely on the earlier manual
      // JS_FileSystem_Sync() behavior, but in future Unity version, this will be
      // expected to change.

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";

        // To lower canvas resolution on mobile devices to gain some
        // performance, uncomment the following line:
        // config.devicePixelRatio = 1;


      } else {
        // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:

        canvas.style.width = isEmbed ? "100%" : "960px";
        canvas.style.height = isEmbed ? "100%" : "600px";
      }

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                unityInstanceRef = unityInstance;
                loadingBar.style.display = "none";
                while (pendingMessages.length) {
                  var item = pendingMessages.shift();
                  try {
                    unityInstanceRef.SendMessage(item[0], item[1], item[2]);
                  } catch (err) {
                    console.warn("Unity bridge message failed:", err);
                  }
                }
                if (window.parent && window.parent !== window) {
                  window.parent.postMessage({ type: "unity-battle-ready" }, window.location.origin);
                }
                fullscreenButton.onclick = () => {
                  unityInstance.SetFullscreen(1);
                };
              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);

    </script>
  </body>
</html>
